<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>หนังสือทดสอบระบบ | คลินิกรักษ์สมองหมออดิศักดิ์</title>
<meta name="description" content="ทดสอบ compose eBook">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Noto+Serif+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E2233;--ink-soft:#46596A;--teal:#0E8A84;--teal-deep:#0A5F5B;--glow:#43D2C8;--paper:#FBF9F5;--paper-2:#F3EFE8;--gold:#B8924F;--fs:1}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai','Anuphan',sans-serif;color:var(--ink);background:var(--paper);line-height:1.9;-webkit-font-smoothing:antialiased}
.top-bar{position:sticky;top:0;z-index:100;background:rgba(251,249,245,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(14,34,51,.08);padding:12px 24px;display:flex;align-items:center;gap:16px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--teal);font-size:14px;font-weight:500;text-decoration:none}
.back-btn:hover{color:var(--teal-deep)}
.top-bar .clinic-name{font-size:13px;color:var(--ink-soft);font-family:'Noto Serif Thai',serif}
.read-bar{height:3px;background:linear-gradient(90deg,var(--teal),var(--glow));position:fixed;top:0;left:0;width:0%;z-index:200;transition:width .1s linear}
.hero{padding:56px 24px 36px;max-width:760px;margin:0 auto;text-align:center}
.series-badge{display:inline-block;background:rgba(184,146,79,.12);color:var(--gold);font-size:12px;font-weight:600;letter-spacing:.1em;padding:4px 16px;border-radius:999px;margin-bottom:14px;font-family:'Noto Serif Thai',serif}
.book-title{font-family:'Noto Serif Thai',serif;font-size:clamp(26px,4.2vw,40px);font-weight:700;line-height:1.3;color:var(--ink);margin-bottom:10px}
.book-num{font-size:14px;color:var(--ink-soft);font-family:'Noto Serif Thai',serif}
.book-desc{font-size:16px;color:var(--ink-soft);line-height:1.7;margin-top:14px;max-width:600px;margin-left:auto;margin-right:auto}
.art-divider{max-width:760px;margin:28px auto;border:none;border-top:1px solid rgba(14,34,51,.1)}
.art-body{max-width:720px;margin:0 auto;padding:0 24px 120px;font-size:calc(17px * var(--fs))}
.art-body h2{font-family:'Noto Serif Thai',serif;font-size:calc(23px * var(--fs));font-weight:700;color:#4338ca;margin:38px 0 14px;padding-bottom:8px;border-bottom:2px solid rgba(67,56,202,.18)}
.art-body h3{font-family:'Noto Serif Thai',serif;font-size:calc(19px * var(--fs));font-weight:600;color:var(--teal-deep);margin:30px 0 10px}
.art-body p{margin-bottom:18px;line-height:1.95}
.art-body ul,.art-body ol{margin:0 0 18px 26px}
.art-body li{margin-bottom:8px;line-height:1.85}
.art-body blockquote{border-left:4px solid var(--teal);background:rgba(14,138,132,.06);padding:14px 18px;border-radius:0 10px 10px 0;margin:22px 0;font-style:italic;color:var(--ink-soft)}
.art-body img{max-width:100%;border-radius:14px;margin:22px auto;display:block;box-shadow:0 4px 24px rgba(14,34,51,.12)}
.art-body a{color:var(--teal);text-decoration:underline}
.art-footer{max-width:720px;margin:0 auto;padding:0 24px 90px;text-align:center}
.back-home{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;padding:12px 24px;border-radius:12px;font-weight:600;font-size:15px;text-decoration:none}
.back-home:hover{background:var(--teal-deep)}
/* Font-size widget */
#fs-widget{position:fixed;bottom:20px;left:20px;z-index:500;background:#fff;border:1px solid rgba(14,34,51,.12);border-radius:50px;padding:6px;display:flex;align-items:center;gap:4px;box-shadow:0 4px 18px rgba(14,34,51,.15)}
#fs-widget button{width:34px;height:34px;border:none;background:var(--paper-2);border-radius:50%;color:var(--ink);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
#fs-widget button:hover{background:var(--teal);color:#fff}
#fs-widget .fs-label{font-size:12px;color:var(--ink-soft);padding:0 4px;min-width:34px;text-align:center}
/* Audio player */
.audio-player-wrap{position:fixed;bottom:0;left:0;right:0;background:rgba(14,26,40,.96);backdrop-filter:blur(12px);padding:14px 20px;z-index:600}
.audio-label{color:rgba(255,255,255,.8);font-size:13px;display:flex;align-items:center;gap:7px;margin-bottom:8px;font-family:'Noto Serif Thai',serif}
/* TTS */
#tts-fab{position:fixed;bottom:24px;right:20px;z-index:500;background:var(--teal);color:#fff;border:none;border-radius:50px;padding:10px 18px;font-family:'Noto Serif Thai',serif;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 18px rgba(14,138,132,.35);display:flex;align-items:center;gap:7px}
#tts-fab:hover{background:var(--teal-deep)}
#tts-bar{position:fixed;bottom:0;left:0;right:0;z-index:600;background:rgba(14,26,40,.96);backdrop-filter:blur(12px);color:#fff;padding:10px 16px 14px;transform:translateY(100%);transition:.35s cubic-bezier(.4,0,.2,1)}
#tts-bar.open{transform:translateY(0)}
#tts-track{height:5px;background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer;margin-bottom:10px}
#tts-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--glow));border-radius:3px;pointer-events:none;transition:width .3s linear}
#tts-controls{display:flex;align-items:center;gap:10px}
#tts-play-btn,#tts-stop-btn{background:none;border:1.5px solid rgba(255,255,255,.3);border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
#tts-label{flex:1;font-size:13px;color:rgba(255,255,255,.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#tts-speed{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;padding:4px 8px;font-size:11px;cursor:pointer}
#tts-speed option{background:#0e1a28}
#tts-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:0 4px}
</style>
</head>
<body>
<div class="read-bar" id="readBar"></div>
<div class="top-bar">
  <a href="../index.html" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>กลับหน้าหลัก</a>
  <span class="clinic-name">คลินิกรักษ์สมองหมออดิศักดิ์</span>
</div>
<div class="hero">
  <div class="series-badge">Brain Care Series</div>
  <h1 class="book-title">หนังสือทดสอบระบบ</h1>
  <div class="book-num">เล่มทดสอบ</div>
  <p class="book-desc">ทดสอบ compose eBook</p>
</div>
<hr class="art-divider">
<article class="art-body">
<!-- BOOK-CONTENT-START -->
<h2>บทที่ 1 ทดสอบ</h2><p>นี่คือเนื้อหาทดสอบการสร้างหน้าหนังสือออนไลน์</p>
<!-- BOOK-CONTENT-END -->
</article>
<div class="art-footer">
  <a href="../index.html" class="back-home"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>กลับหน้าคลินิก</a>
</div>
<div id="fs-widget">
  <button onclick="fsAdj(-1)">A−</button>
  <span class="fs-label" id="fsLabel">100%</span>
  <button onclick="fsAdj(1)">A+</button>
</div>
<button id="tts-fab"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>ฟังหนังสือ</button><div id="tts-bar"><div id="tts-track"><div id="tts-fill"></div></div><div id="tts-controls"><button id="tts-play-btn">▶</button><button id="tts-stop-btn">⏹</button><div id="tts-label">พร้อมเล่น</div><select id="tts-speed"><option value="0.8">0.8×</option><option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option><option value="2">2×</option></select><button id="tts-close">✕</button></div></div>
<script>
var FS_LEVELS=[0.85,0.92,1,1.12,1.26],fsIdx=2;
function fsAdj(d){fsIdx=Math.max(0,Math.min(FS_LEVELS.length-1,fsIdx+d));document.documentElement.style.setProperty('--fs',FS_LEVELS[fsIdx]);document.getElementById('fsLabel').textContent=Math.round(FS_LEVELS[fsIdx]*100)+'%';}
window.addEventListener('scroll',()=>{const h=document.documentElement,s=h.scrollTop||document.body.scrollTop,m=(h.scrollHeight-h.clientHeight)||1;document.getElementById('readBar').style.width=(s/m*100)+'%';},{passive:true});
(function(){
  const nodes=[...document.querySelectorAll('.art-body h2,.art-body h3,.art-body p')].filter(n=>n.textContent.trim().length>3);
  let cur=-1,playing=false,speed=1,thVoice=null;
  function fv(){const v=speechSynthesis.getVoices();thVoice=v.find(x=>x.lang.startsWith('th'))||null;}
  speechSynthesis.onvoiceschanged=fv;fv();
  function speak(i){if(i<0||i>=nodes.length){stop();return;}cur=i;
    document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));
    nodes[i].classList.add('tts-hl');nodes[i].scrollIntoView({behavior:'smooth',block:'center'});
    updateUI();const u=new SpeechSynthesisUtterance(nodes[i].textContent.trim());
    u.lang='th-TH';u.rate=speed;if(thVoice)u.voice=thVoice;
    u.onend=()=>{if(playing)speak(cur+1);};u.onerror=()=>{if(playing)speak(cur+1);}
    speechSynthesis.cancel();speechSynthesis.speak(u);}
  function play(){playing=true;speak(cur<0?0:cur);}
  function pause(){playing=false;speechSynthesis.cancel();updateUI();}
  function stop(){playing=false;cur=-1;speechSynthesis.cancel();document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));updateUI();}
  function updateUI(){const b=document.getElementById('tts-play-btn');if(b)b.textContent=playing?'⏸':'▶';
    const f=document.getElementById('tts-fill');if(f)f.style.width=(cur>=0?(cur/(nodes.length-1))*100:0)+'%';
    const l=document.getElementById('tts-label');if(l)l.textContent=cur>=0?nodes[cur].textContent.trim().slice(0,50)+'…':'พร้อมเล่น';}
  document.getElementById('tts-track')?.addEventListener('click',e=>{const r=e.currentTarget.getBoundingClientRect(),p=(e.clientX-r.left)/r.width,i=Math.round(p*(nodes.length-1));playing=true;speak(Math.max(0,Math.min(i,nodes.length-1)));});
  document.getElementById('tts-play-btn')?.addEventListener('click',()=>playing?pause():play());
  document.getElementById('tts-stop-btn')?.addEventListener('click',stop);
  document.getElementById('tts-close')?.addEventListener('click',()=>{stop();document.getElementById('tts-bar').classList.remove('open');document.getElementById('tts-fab').style.display='flex';});
  document.getElementById('tts-speed')?.addEventListener('change',e=>{speed=parseFloat(e.target.value);if(playing){speechSynthesis.cancel();speak(cur);}});
  document.getElementById('tts-fab')?.addEventListener('click',()=>{document.getElementById('tts-bar').classList.add('open');document.getElementById('tts-fab').style.display='none';if(!playing)play();});
  updateUI();
})();
</script>
</body>
</html>
